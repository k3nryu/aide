services:
  backend:
    build: ./backend
    container_name: aide_backend
    restart: unless-stopped
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app
    networks:
      - default
      - radicale_default

networks:
  radicale_default:
    external: true
