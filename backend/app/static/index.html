<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aide</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f3;
        --panel: #ffffff;
        --ink: #1d2522;
        --muted: #6c756f;
        --line: #dce2dc;
        --accent: #1f7a67;
        --accent-strong: #15584b;
        --warn: #a24f24;
        --soft: #eef4f1;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.4;
      }

      main {
        width: min(920px, 100%);
        margin: 0 auto;
        padding: 18px 14px 86px;
      }

      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 16px;
        padding: 10px 0 18px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        font-weight: 760;
        letter-spacing: 0;
      }

      .date {
        color: var(--muted);
        font-size: 14px;
        white-space: nowrap;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .page {
        display: none;
      }

      .page.active {
        display: grid;
        gap: 14px;
      }

      .app-nav {
        gap: 6px;
        background: var(--panel);
        border: 1px solid var(--line);
        padding: 5px;
      }

      .top-nav {
        display: none;
        border-radius: 8px;
        margin-bottom: 14px;
      }

      .bottom-nav {
        position: fixed;
        right: 10px;
        bottom: 10px;
        left: 10px;
        z-index: 10;
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        border-radius: 10px;
        box-shadow: 0 8px 22px rgba(29, 37, 34, 0.14);
      }

      .nav-button {
        min-height: 44px;
        border-radius: 7px;
        padding: 8px 6px;
        background: transparent;
        color: var(--muted);
        font-size: 13px;
      }

      .nav-button.active {
        background: var(--accent);
        color: #fff;
      }

      section {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 14px;
      }

      h2 {
        margin: 0 0 12px;
        font-size: 17px;
        letter-spacing: 0;
      }

      form {
        display: grid;
        gap: 10px;
      }

      label {
        display: grid;
        gap: 6px;
        color: var(--muted);
        font-size: 13px;
      }

      input,
      textarea,
      select {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 11px 12px;
        color: var(--ink);
        background: #fff;
        font: inherit;
      }

      textarea {
        min-height: 76px;
        resize: vertical;
      }

      button {
        border: 0;
        border-radius: 8px;
        padding: 12px 14px;
        color: #fff;
        background: var(--accent);
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button:active {
        background: var(--accent-strong);
      }

      .secondary {
        border: 1px solid var(--line);
        background: #fff;
        color: var(--ink);
        padding: 8px 10px;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .status {
        min-height: 20px;
        color: var(--muted);
        font-size: 13px;
      }

      .status.error {
        color: var(--warn);
      }

      .items {
        display: grid;
        gap: 8px;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .stat {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px;
        background: #fbfcfa;
      }

      .stat-value {
        display: block;
        font-size: 22px;
        font-weight: 800;
      }

      .stat-label {
        display: block;
        color: var(--muted);
        font-size: 13px;
      }

      .item {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px;
        background: #fbfcfa;
      }

      details.item {
        padding: 0;
      }

      summary {
        cursor: pointer;
        list-style: none;
      }

      summary::-webkit-details-marker {
        display: none;
      }

      .summary-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px;
      }

      .detail-body {
        display: grid;
        gap: 8px;
        border-top: 1px solid var(--line);
        padding: 10px;
      }

      .report-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .report-line {
        display: grid;
        gap: 2px;
      }

      .report-key {
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      .finance-summary {
        display: grid;
        gap: 10px;
      }

      .money-small {
        display: block;
        color: var(--muted);
        font-size: 12px;
        font-weight: 600;
        margin-top: 3px;
      }

      .currency-toggle {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 6px;
      }

      .currency-button {
        border: 1px solid var(--line);
        background: #fff;
        color: var(--muted);
      }

      .currency-button.active {
        background: var(--accent);
        color: #fff;
      }

      .asset-row {
        display: grid;
        grid-template-columns: 1fr 98px;
        gap: 8px;
        align-items: end;
      }

      .item-title {
        font-weight: 700;
        overflow-wrap: anywhere;
      }

      .meta {
        margin-top: 4px;
        color: var(--muted);
        font-size: 13px;
        overflow-wrap: anywhere;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        border-radius: 999px;
        padding: 2px 9px;
        background: var(--soft);
        color: var(--accent-strong);
        font-size: 12px;
        font-weight: 700;
      }

      .empty {
        color: var(--muted);
        font-size: 14px;
      }

      @media (min-width: 760px) {
        main {
          padding-top: 28px;
          padding-bottom: 64px;
        }

        .grid {
          grid-template-columns: 1fr 1fr;
          align-items: start;
        }

        .wide {
          grid-column: 1 / -1;
        }

        .row {
          grid-template-columns: 1fr 1fr;
        }

        .stats {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }

        .report-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .top-nav {
          display: grid;
          grid-template-columns: repeat(5, 1fr);
        }

        .bottom-nav {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Aide</h1>
        <div class="date" id="today"></div>
      </header>

      <nav class="app-nav top-nav">
        <button class="nav-button active" type="button" data-page="today">今日</button>
        <button class="nav-button" type="button" data-page="tasks">任务</button>
        <button class="nav-button" type="button" data-page="money">财务</button>
        <button class="nav-button" type="button" data-page="thought">想法</button>
        <button class="nav-button" type="button" data-page="activity">行为</button>
      </nav>

      <div class="page active" data-page-panel="today">
        <section>
          <h2>今日简报</h2>
          <div class="items" id="briefing"></div>
        </section>

        <section>
          <h2>状态概览</h2>
          <div class="stats">
            <div class="stat">
              <span class="stat-value" id="stat-open-tasks">0</span>
              <span class="stat-label">未完成任务</span>
            </div>
            <div class="stat">
              <span class="stat-value" id="stat-not-todos">0</span>
              <span class="stat-label">Not-to-do</span>
            </div>
            <div class="stat">
              <span class="stat-value" id="stat-activities">0</span>
              <span class="stat-label">行为记录</span>
            </div>
            <div class="stat">
              <span class="stat-value" id="stat-net">0</span>
              <span class="stat-label">财务自由差距</span>
            </div>
          </div>
        </section>
      </div>

      <div class="page" data-page-panel="tasks">
        <section>
          <h2>任务添加</h2>
          <form id="task-form" onsubmit="return false">
            <label>
              任务
              <input id="task-title" name="title" maxlength="255" required placeholder="例：今天学习 20 个单词" />
            </label>
            <details>
              <summary class="secondary">详细设置</summary>
              <div class="detail-body">
                <label>
                  描述
                  <textarea id="task-description" name="description" placeholder="可选"></textarea>
                </label>
                <div class="row">
                  <label>
                    类型
                    <select id="task-type" name="type">
                      <option value="todo">todo</option>
                      <option value="not_todo">not-to-do</option>
                    </select>
                  </label>
                  <label>
                    重要度
                    <select id="task-importance" name="importance">
                      <option value="medium">普通</option>
                      <option value="high">重要</option>
                      <option value="low">不重要</option>
                    </select>
                  </label>
                  <label>
                    紧急度
                    <select id="task-urgency" name="urgency">
                      <option value="medium">普通</option>
                      <option value="high">紧急</option>
                      <option value="low">不紧急</option>
                    </select>
                  </label>
                </div>
                <div class="meta" id="task-priority-preview">Aide 会根据重要度和紧急度自动评估优先级。</div>
                <label>
                  截止日期
                  <input id="task-due-date" name="due_date" type="date" />
                </label>
              </div>
            </details>
            <button type="submit">添加</button>
            <div class="status" id="task-status"></div>
          </form>
        </section>

        <section>
          <h2>任务一览</h2>
          <div class="items" id="task-list"></div>
        </section>

        <section>
          <details>
            <summary class="secondary">查看 Not-to-Do</summary>
            <div class="detail-body">
              <div class="items" id="not-todo-list"></div>
            </div>
          </details>
        </section>
      </div>

      <div class="page" data-page-panel="activity">
        <section>
          <h2>行为添加</h2>
          <form id="activity-form" onsubmit="return false">
            <label>
              做了什么
              <input id="activity-title" name="title" maxlength="255" required placeholder="例：21:30 去了一趟便利店" />
            </label>
            <details>
              <summary class="secondary">详细设置</summary>
              <div class="detail-body">
                <div class="row">
                  <label>
                    分类
                    <select id="activity-category" name="category">
                      <option value="">不分类</option>
                      <option value="health">健康</option>
                      <option value="movement">移动</option>
                      <option value="food">饮食</option>
                      <option value="sleep">睡眠</option>
                      <option value="exercise">运动</option>
                      <option value="habit">习惯</option>
                    </select>
                  </label>
                  <label>
                    时间
                    <input id="activity-time" name="occurred_at" type="datetime-local" />
                  </label>
                </div>
                <label>
                  备注
                  <textarea id="activity-note" name="note" placeholder="可选"></textarea>
                </label>
              </div>
            </details>
            <button type="submit">记录</button>
            <div class="status" id="activity-status"></div>
          </form>
        </section>

        <section>
          <h2>最近行为</h2>
          <div class="items" id="activity-list"></div>
        </section>
      </div>

      <div class="page" data-page-panel="thought">
        <section>
          <h2>想法</h2>
          <form id="thought-form" onsubmit="return false">
            <label>
              内容
              <textarea id="thought-content" name="content" required placeholder="记录一个想法"></textarea>
            </label>
            <details>
              <summary class="secondary">详细设置</summary>
              <div class="detail-body">
                <label>
                  标签
                  <input id="thought-tag" name="tag" maxlength="100" placeholder="可选" />
                </label>
              </div>
            </details>
            <button type="submit">保存</button>
            <div class="status" id="thought-status"></div>
          </form>
        </section>

        <section>
          <h2>想法列表</h2>
          <div class="items" id="thought-list"></div>
        </section>
      </div>

      <div class="page" data-page-panel="money">
        <section>
          <h2>财务概况</h2>
          <div class="finance-summary">
            <div class="currency-toggle">
              <button class="currency-button active" type="button" data-display-currency="JPY">日元</button>
              <button class="currency-button" type="button" data-display-currency="CNY">人民币</button>
            </div>
            <div class="stats">
              <div class="stat">
                <span class="stat-value" id="finance-assets">0</span>
                <span class="money-small" id="finance-assets-small"></span>
                <span class="stat-label">当前资产</span>
              </div>
              <div class="stat">
                <span class="stat-value" id="finance-daily-income">0</span>
                <span class="money-small" id="finance-daily-income-small"></span>
                <span class="stat-label">每天大概赚</span>
              </div>
              <div class="stat">
                <span class="stat-value" id="finance-target">0</span>
                <span class="money-small" id="finance-target-small"></span>
                <span class="stat-label">财务自由目标</span>
              </div>
              <div class="stat">
                <span class="stat-value" id="finance-gap">0</span>
                <span class="money-small" id="finance-gap-time"></span>
                <span class="stat-label">还差</span>
              </div>
            </div>
            <div class="meta" id="exchange-status"></div>
          </div>
        </section>

        <section>
          <h2>更新财务状态</h2>
          <form id="finance-form" onsubmit="return false">
            <div class="asset-row">
              <label>
                日元资产
                <input id="asset-jpy" name="asset_jpy" type="number" step="1" inputmode="decimal" />
              </label>
              <span class="meta">JPY</span>
            </div>
            <div class="asset-row">
              <label>
                人民币资产
                <input id="asset-cny" name="asset_cny" type="number" step="1" inputmode="decimal" />
              </label>
              <span class="meta">CNY</span>
            </div>
            <div class="asset-row">
              <label>
                美金资产
                <input id="asset-usd" name="asset_usd" type="number" step="1" inputmode="decimal" />
              </label>
              <span class="meta">USD</span>
            </div>
            <div class="asset-row">
              <label>
                比特币
                <input id="asset-btc" name="asset_btc" type="number" step="0.00000001" inputmode="decimal" />
              </label>
              <span class="meta">BTC</span>
            </div>
            <div class="asset-row">
              <label>
                以太坊
                <input id="asset-eth" name="asset_eth" type="number" step="0.00000001" inputmode="decimal" />
              </label>
              <span class="meta">ETH</span>
            </div>
            <div class="row">
              <label>
                每天大概赚多少钱
                <input id="finance-daily-income-input" name="daily_income" required type="number" step="1" inputmode="decimal" />
              </label>
              <label>
                日收入单位
                <select id="finance-daily-income-currency">
                  <option value="JPY">JPY</option>
                  <option value="CNY">CNY</option>
                  <option value="USD">USD</option>
                </select>
              </label>
            </div>
            <div class="row">
              <label>
                财务自由目标
                <input id="finance-target-input" name="target" required type="number" step="1" inputmode="decimal" />
              </label>
              <label>
                目标单位
                <select id="finance-target-currency">
                  <option value="JPY">JPY</option>
                  <option value="CNY">CNY</option>
                  <option value="USD">USD</option>
                </select>
              </label>
            </div>
            <button type="submit">更新</button>
            <div class="status" id="finance-status"></div>
          </form>
        </section>
      </div>
    </main>

    <nav class="app-nav bottom-nav">
      <button class="nav-button active" type="button" data-page="today">今日</button>
      <button class="nav-button" type="button" data-page="tasks">任务</button>
      <button class="nav-button" type="button" data-page="money">财务</button>
      <button class="nav-button" type="button" data-page="thought">想法</button>
      <button class="nav-button" type="button" data-page="activity">行为</button>
    </nav>

    <script>
      const today = document.querySelector("#today");
      const activityForm = document.querySelector("#activity-form");
      const activityStatus = document.querySelector("#activity-status");
      const activityList = document.querySelector("#activity-list");
      const taskForm = document.querySelector("#task-form");
      const taskStatus = document.querySelector("#task-status");
      const taskList = document.querySelector("#task-list");
      const notTodoList = document.querySelector("#not-todo-list");
      const thoughtForm = document.querySelector("#thought-form");
      const thoughtStatus = document.querySelector("#thought-status");
      const thoughtList = document.querySelector("#thought-list");
      const financeForm = document.querySelector("#finance-form");
      const financeStatus = document.querySelector("#finance-status");
      const briefing = document.querySelector("#briefing");
      const financeProfile = loadFinanceProfile();
      const exchangeRates = {
        ready: false,
        date: null,
        error: null,
        fiatToJpy: { JPY: 1, CNY: 20, USD: 155 },
        fiatToCny: { JPY: 0.05, CNY: 1, USD: 7.2 },
        cryptoToJpy: { BTC: 0, ETH: 0 },
        cryptoToCny: { BTC: 0, ETH: 0 },
      };

      try {
        today.textContent = new Intl.DateTimeFormat("zh-CN", {
          year: "numeric",
          month: "short",
          day: "numeric",
          weekday: "short",
        }).format(new Date());
      } catch (error) {
        today.textContent = new Date().toLocaleDateString();
      }

      document.addEventListener("click", (event) => {
        let target = event.target;
        while (target && target !== document) {
          if (target.getAttribute && target.getAttribute("data-page")) {
            event.preventDefault();
            showPage(target.getAttribute("data-page"));
            return;
          }
          if (target.getAttribute && target.getAttribute("data-display-currency")) {
            event.preventDefault();
            setDisplayCurrency(target.getAttribute("data-display-currency"));
            return;
          }
          target = target.parentNode;
        }
      });

      function showPage(pageName) {
        const panels = document.querySelectorAll("[data-page-panel]");
        for (let index = 0; index < panels.length; index += 1) {
          const panel = panels[index];
          if (panel.getAttribute("data-page-panel") === pageName) {
            panel.classList.add("active");
          } else {
            panel.classList.remove("active");
          }
        }

        const buttons = document.querySelectorAll("[data-page]");
        for (let index = 0; index < buttons.length; index += 1) {
          const button = buttons[index];
          if (button.getAttribute("data-page") === pageName) {
            button.classList.add("active");
          } else {
            button.classList.remove("active");
          }
        }
      }

      function setDisplayCurrency(currency) {
        financeProfile.displayCurrency = currency;
        saveFinanceProfile(financeProfile);
        updateCurrencyButtons();
        renderFinanceProfile();
        document.querySelector("#stat-net").textContent = formatMoneyWithCurrency(getFinanceGap(currency), currency);
      }

      function updateCurrencyButtons() {
        const buttons = document.querySelectorAll("[data-display-currency]");
        for (let index = 0; index < buttons.length; index += 1) {
          const button = buttons[index];
          const isActive = button.getAttribute("data-display-currency") === financeProfile.displayCurrency;
          if (isActive) {
            button.classList.add("active");
            button.setAttribute("aria-pressed", "true");
          } else {
            button.classList.remove("active");
            button.setAttribute("aria-pressed", "false");
          }
        }
      }

      function localDateTimeValue(value) {
        if (!value) return null;
        return new Date(value).toISOString();
      }

      function formatDateTime(value) {
        if (!value) return "";
        return new Intl.DateTimeFormat("zh-CN", {
          dateStyle: "short",
          timeStyle: "short",
        }).format(new Date(value));
      }

      function formatMoney(value) {
        return new Intl.NumberFormat("zh-CN", {
          maximumFractionDigits: 2,
        }).format(Number(value || 0));
      }

      function formatMoneyWithCurrency(value, currency) {
        const amount = Number(value || 0);
        const maximumFractionDigits = currency === "JPY" ? 0 : 2;
        const prefix = currency === "JPY" ? "¥" : currency === "CNY" ? "¥" : "$";
        return `${prefix}${new Intl.NumberFormat("zh-CN", { maximumFractionDigits }).format(amount)} ${currency}`;
      }

      function compactMoneyText(value, currency) {
        const amount = Number(value || 0);
        const unit = currency === "JPY" ? "日元" : currency === "CNY" ? "人民币" : currency;
        if (amount >= 100000000) {
          return `约 ${(amount / 100000000).toFixed(2)} 亿${unit}`;
        }
        if (amount >= 10000000) {
          return `约 ${(amount / 10000000).toFixed(2)} 千万${unit}`;
        }
        if (amount >= 10000) {
          return `约 ${(amount / 10000).toFixed(2)} 万${unit}`;
        }
        return `约 ${formatMoney(amount)} ${unit}`;
      }

      function formatDurationFromDays(days) {
        if (!Number.isFinite(days) || days <= 0) return "已达到目标";
        const wholeDays = Math.ceil(days);
        const years = Math.floor(wholeDays / 365);
        const months = Math.floor((wholeDays % 365) / 30);
        const remainingDays = (wholeDays % 365) % 30;
        const parts = [];
        if (years) parts.push(`${years}年`);
        if (months) parts.push(`${months}个月`);
        if (remainingDays || !parts.length) parts.push(`${remainingDays}天`);
        return `还需要 ${parts.join("")}`;
      }

      function loadFinanceProfile() {
        try {
          const stored = JSON.parse(localStorage.getItem("aideFinanceProfile") || "{}");
          const storedAssets = stored.assetsByCurrency || {};
          return {
            displayCurrency: stored.displayCurrency || "JPY",
            assetsByCurrency: {
              JPY: Number(storedAssets.JPY || stored.assets || 0),
              CNY: Number(storedAssets.CNY || 0),
              USD: Number(storedAssets.USD || 0),
              BTC: Number(storedAssets.BTC || 0),
              ETH: Number(storedAssets.ETH || 0),
            },
            dailyIncome: Number(stored.dailyIncome || 0),
            dailyIncomeCurrency: stored.dailyIncomeCurrency || "JPY",
            target: Number(stored.target || 0),
            targetCurrency: stored.targetCurrency || "JPY",
          };
        } catch (error) {
          return {
            displayCurrency: "JPY",
            assetsByCurrency: { JPY: 0, CNY: 0, USD: 0, BTC: 0, ETH: 0 },
            dailyIncome: 0,
            dailyIncomeCurrency: "JPY",
            target: 0,
            targetCurrency: "JPY",
          };
        }
      }

      function saveFinanceProfile(profile) {
        localStorage.setItem("aideFinanceProfile", JSON.stringify(profile));
      }

      async function refreshExchangeRates() {
        try {
          const fiatResponse = await fetch("https://api.frankfurter.dev/v1/latest?base=JPY&symbols=CNY,USD");
          const fiatData = await fiatResponse.json();
          const jpyToCny = Number(fiatData.rates.CNY);
          const jpyToUsd = Number(fiatData.rates.USD);
          exchangeRates.date = fiatData.date || null;
          exchangeRates.fiatToCny = {
            JPY: jpyToCny,
            CNY: 1,
            USD: jpyToCny / jpyToUsd,
          };
          exchangeRates.fiatToJpy = {
            JPY: 1,
            CNY: 1 / jpyToCny,
            USD: 1 / jpyToUsd,
          };

          const cryptoResponse = await fetch(
            "https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=jpy,cny",
          );
          const cryptoData = await cryptoResponse.json();
          const bitcoin = cryptoData.bitcoin || {};
          const ethereum = cryptoData.ethereum || {};
          exchangeRates.cryptoToJpy = {
            BTC: Number(bitcoin.jpy || 0),
            ETH: Number(ethereum.jpy || 0),
          };
          exchangeRates.cryptoToCny = {
            BTC: Number(bitcoin.cny || 0),
            ETH: Number(ethereum.cny || 0),
          };
          exchangeRates.ready = true;
          exchangeRates.error = null;
        } catch (error) {
          exchangeRates.error = "汇率获取失败，暂时使用上次保存的输入和备用汇率";
        }
        renderFinanceProfile();
      }

      function convertToCurrency(amount, fromCurrency, toCurrency) {
        const value = Number(amount || 0);
        if (fromCurrency === toCurrency) return value;
        if (fromCurrency === "BTC" || fromCurrency === "ETH") {
          return value * (toCurrency === "JPY" ? exchangeRates.cryptoToJpy[fromCurrency] : exchangeRates.cryptoToCny[fromCurrency]);
        }
        return value * (toCurrency === "JPY" ? exchangeRates.fiatToJpy[fromCurrency] : exchangeRates.fiatToCny[fromCurrency]);
      }

      function getTotalAssets(currency) {
        const assets = financeProfile.assetsByCurrency;
        return (
          convertToCurrency(assets.JPY, "JPY", currency) +
          convertToCurrency(assets.CNY, "CNY", currency) +
          convertToCurrency(assets.USD, "USD", currency) +
          convertToCurrency(assets.BTC, "BTC", currency) +
          convertToCurrency(assets.ETH, "ETH", currency)
        );
      }

      function getDailyIncome(currency) {
        return convertToCurrency(financeProfile.dailyIncome, financeProfile.dailyIncomeCurrency, currency);
      }

      function getTarget(currency) {
        return convertToCurrency(financeProfile.target, financeProfile.targetCurrency, currency);
      }

      function getFinanceGap(currency) {
        return Math.max(getTarget(currency) - getTotalAssets(currency), 0);
      }

      function setStatus(element, message, isError = false) {
        element.textContent = message;
        element.classList.toggle("error", isError);
      }

      function labelLevel(value) {
        if (value === "high") return "高";
        if (value === "low") return "低";
        return "普通";
      }

      function evaluateTaskPriority(importance, urgency) {
        if (importance === "high" && urgency !== "high") return "high";
        if (importance === "high" && urgency === "high") return "high";
        if (importance !== "high" && urgency === "high") return "medium";
        if (importance === "low" && urgency === "low") return "low";
        return "medium";
      }

      function urgencyWithDueDate(urgency, dueDateValue, done = false) {
        if (urgency === "high") return "high";
        if (!dueDateValue || done) return urgency || "medium";
        const todayDate = new Date();
        todayDate.setHours(0, 0, 0, 0);
        const dueDate = new Date(`${dueDateValue}T00:00:00`);
        const daysLeft = Math.ceil((dueDate - todayDate) / 86400000);
        return daysLeft <= 3 ? "high" : urgency || "medium";
      }

      function effectiveUrgency(item) {
        return urgencyWithDueDate(item.urgency || "medium", item.due_date, item.done);
      }

      function effectivePriority(item) {
        return evaluateTaskPriority(item.importance || "medium", effectiveUrgency(item));
      }

      function priorityRank(value) {
        if (value === "high") return 3;
        if (value === "medium") return 2;
        return 1;
      }

      function taskSortValue(item) {
        return priorityRank(effectivePriority(item)) * 100 + priorityRank(item.importance || "medium") * 10 + priorityRank(effectiveUrgency(item));
      }

      function sortedTasks(items) {
        return items.slice().sort((a, b) => {
          const priorityDifference = taskSortValue(b) - taskSortValue(a);
          if (priorityDifference !== 0) return priorityDifference;
          if (a.due_date && b.due_date) return a.due_date.localeCompare(b.due_date);
          if (a.due_date) return -1;
          if (b.due_date) return 1;
          return new Date(b.created_at) - new Date(a.created_at);
        });
      }

      function updateTaskPriorityPreview() {
        const importance = document.querySelector("#task-importance").value;
        const urgency = urgencyWithDueDate(
          document.querySelector("#task-urgency").value,
          document.querySelector("#task-due-date").value || null,
        );
        const priority = evaluateTaskPriority(importance, urgency);
        document.querySelector("#task-priority-preview").textContent =
          `Aide 评估优先级：${labelLevel(priority)}。判断依据：重要度 ${labelLevel(importance)}，紧急度 ${labelLevel(urgency)}。`;
      }

      async function api(path, options = {}) {
        const response = await fetch(path, {
          headers: { "Content-Type": "application/json" },
          ...options,
        });
        if (!response.ok) {
          throw new Error(await response.text());
        }
        return response.json();
      }

      function renderActivity(items) {
        activityList.innerHTML = "";
        if (!items.length) {
          activityList.innerHTML = '<div class="empty">还没有记录</div>';
          return;
        }
        for (const item of items.slice(0, 12)) {
          const node = document.createElement("div");
          node.className = "item";
          node.innerHTML = `
            <div class="item-title">${escapeHtml(item.title)}</div>
            <div class="meta">
              ${item.category ? `<span class="pill">${escapeHtml(item.category)}</span> ` : ""}
              ${formatDateTime(item.occurred_at)}
            </div>
            ${item.note ? `<div class="meta">${escapeHtml(item.note)}</div>` : ""}
          `;
          activityList.appendChild(node);
        }
      }

      function renderTasks(items) {
        taskList.innerHTML = "";
        const todos = sortedTasks(items.filter((item) => item.type !== "not_todo"));
        if (!todos.length) {
          taskList.innerHTML = '<div class="empty">还没有任务</div>';
          renderNotTodos(items);
          return;
        }
        for (const item of todos.slice(0, 12)) {
          const node = document.createElement("details");
          node.className = "item";
          const urgency = effectiveUrgency(item);
          const priority = effectivePriority(item);
          node.innerHTML = `
            <summary class="summary-row">
              <span class="item-title">${escapeHtml(item.title)}</span>
              <span class="pill">${escapeHtml(labelLevel(priority))}</span>
            </summary>
            <div class="detail-body">
              ${item.description ? `<div class="meta">${escapeHtml(item.description)}</div>` : ""}
              <div class="meta">
                <span class="pill">重要度：${escapeHtml(labelLevel(item.importance))}</span>
                <span class="pill">紧急度：${escapeHtml(labelLevel(urgency))}</span>
                ${urgency !== item.urgency ? '<span class="pill">截止日临近</span>' : ""}
                ${item.due_date ? escapeHtml(item.due_date) : "无截止日期"}
                ${item.done ? " · done" : ""}
              </div>
              <form class="task-edit-form" data-task-id="${item.id}" onsubmit="return false">
                <label>任务<input name="title" value="${escapeAttribute(item.title)}" required /></label>
                <label>描述<textarea name="description">${escapeHtml(item.description || "")}</textarea></label>
                <div class="row">
                  <label>重要度${selectHtml("importance", item.importance || "medium", [["medium", "普通"], ["high", "重要"], ["low", "不重要"]])}</label>
                  <label>紧急度${selectHtml("urgency", item.urgency || "medium", [["medium", "普通"], ["high", "紧急"], ["low", "不紧急"]])}</label>
                </div>
                <label>截止日期<input name="due_date" type="date" value="${escapeAttribute(item.due_date || "")}" /></label>
                <button type="submit">保存修改</button>
                <div class="status"></div>
              </form>
              ${item.done ? "" : `<button class="secondary complete-task" data-task-id="${item.id}" type="button">完成</button>`}
            </div>
          `;
          taskList.appendChild(node);
        }
        bindTaskEditForms();
        const completeButtons = document.querySelectorAll(".complete-task");
        for (let index = 0; index < completeButtons.length; index += 1) {
          const button = completeButtons[index];
          button.addEventListener("click", async () => {
            button.disabled = true;
            await api(`/tasks/${button.getAttribute("data-task-id")}/complete`, { method: "POST" });
            await refresh();
          });
        }
        renderNotTodos(items);
      }

      function renderNotTodos(items) {
        const notTodos = sortedTasks(items.filter((item) => item.type === "not_todo"));
        notTodoList.innerHTML = "";
        if (!notTodos.length) {
          notTodoList.innerHTML = '<div class="empty">还没有 not-to-do</div>';
          return;
        }
        for (const item of notTodos.slice(0, 12)) {
          const node = document.createElement("div");
          node.className = "item";
          node.innerHTML = `
            <div class="item-title">${escapeHtml(item.title)}</div>
            ${item.description ? `<div class="meta">${escapeHtml(item.description)}</div>` : ""}
            <div class="meta">
              <span class="pill">${escapeHtml(item.priority)}</span>
              <span class="pill">重要度：${escapeHtml(labelLevel(item.importance))}</span>
              <span class="pill">紧急度：${escapeHtml(labelLevel(item.urgency))}</span>
              ${item.due_date ? escapeHtml(item.due_date) : "无截止日期"}
            </div>
          `;
          notTodoList.appendChild(node);
        }
      }

      function renderThoughts(items) {
        thoughtList.innerHTML = "";
        if (!items.length) {
          thoughtList.innerHTML = '<div class="empty">还没有 thoughts</div>';
          return;
        }
        for (const item of items.slice(0, 12)) {
          const node = document.createElement("div");
          node.className = "item";
          node.innerHTML = `
            <div class="item-title">${escapeHtml(item.content)}</div>
            <div class="meta">
              ${item.tag ? `<span class="pill">${escapeHtml(item.tag)}</span> ` : ""}
              ${formatDateTime(item.created_at)}
            </div>
          `;
          thoughtList.appendChild(node);
        }
      }

      function renderStats(tasks, activities, money) {
        const openTasks = tasks.filter((item) => item.type !== "not_todo" && !item.done);
        const notTodos = tasks.filter((item) => item.type === "not_todo" && !item.done);
        document.querySelector("#stat-open-tasks").textContent = openTasks.length;
        document.querySelector("#stat-not-todos").textContent = notTodos.length;
        document.querySelector("#stat-activities").textContent = activities.length;
        document.querySelector("#stat-net").textContent = formatMoneyWithCurrency(
          getFinanceGap(financeProfile.displayCurrency),
          financeProfile.displayCurrency,
        );
      }

      function renderFinanceProfile() {
        const currency = financeProfile.displayCurrency;
        const assets = getTotalAssets(currency);
        const dailyIncome = getDailyIncome(currency);
        const target = getTarget(currency);
        const gap = getFinanceGap(currency);
        const days = dailyIncome > 0 ? gap / dailyIncome : Infinity;

        document.querySelector("#finance-assets").textContent = formatMoneyWithCurrency(assets, currency);
        document.querySelector("#finance-assets-small").textContent = `(${compactMoneyText(assets, currency)})`;
        document.querySelector("#finance-daily-income").textContent = formatMoneyWithCurrency(dailyIncome, currency);
        document.querySelector("#finance-daily-income-small").textContent = `(${compactMoneyText(dailyIncome, currency)} / 日)`;
        document.querySelector("#finance-target").textContent = formatMoneyWithCurrency(target, currency);
        document.querySelector("#finance-target-small").textContent = `(${compactMoneyText(target, currency)})`;
        document.querySelector("#finance-gap").textContent = formatMoneyWithCurrency(gap, currency);
        document.querySelector("#finance-gap-time").textContent = dailyIncome > 0 ? formatDurationFromDays(days) : "请先设置每日收入";

        document.querySelector("#asset-jpy").value = financeProfile.assetsByCurrency.JPY || "";
        document.querySelector("#asset-cny").value = financeProfile.assetsByCurrency.CNY || "";
        document.querySelector("#asset-usd").value = financeProfile.assetsByCurrency.USD || "";
        document.querySelector("#asset-btc").value = financeProfile.assetsByCurrency.BTC || "";
        document.querySelector("#asset-eth").value = financeProfile.assetsByCurrency.ETH || "";
        document.querySelector("#finance-daily-income-input").value = financeProfile.dailyIncome || "";
        document.querySelector("#finance-daily-income-currency").value = financeProfile.dailyIncomeCurrency;
        document.querySelector("#finance-target-input").value = financeProfile.target || "";
        document.querySelector("#finance-target-currency").value = financeProfile.targetCurrency;
        document.querySelector("#exchange-status").textContent = exchangeRates.error
          ? exchangeRates.error
          : exchangeRates.ready
            ? `汇率日期：${exchangeRates.date || "today"}`
            : "正在获取今日汇率...";

        updateCurrencyButtons();
      }

      function renderBriefing(data) {
        const tasks = data.tasks || [];
        const notTodos = data.not_todos || [];
        briefing.innerHTML = `
          <div class="item">
            <div class="item-title">${escapeHtml(data.message || "Today's briefing from Aide.")}</div>
            <div class="meta">${escapeHtml(data.date || "")}</div>
          </div>
        `;
        for (const item of tasks.slice(0, 5)) {
          const node = document.createElement("details");
          node.className = "item";
          node.innerHTML = briefingReport(item, "任务");
          briefing.appendChild(node);
        }
        for (const item of notTodos.slice(0, 5)) {
          const node = document.createElement("details");
          node.className = "item";
          node.innerHTML = briefingReport(item, "Not-to-do");
          briefing.appendChild(node);
        }
      }

      function briefingReport(item, typeLabel) {
        return `
          <summary class="summary-row">
            <span class="item-title">${escapeHtml(item.title)}</span>
            <span class="pill">${escapeHtml(typeLabel)}</span>
          </summary>
          <div class="detail-body">
            <div class="report-grid">
              ${reportLine("What", item.title)}
              ${reportLine("Why", item.description || (typeLabel === "Not-to-do" ? "需要避免或提醒自己的约束" : "今日需要处理或关注"))}
              ${reportLine("Who", "我")}
              ${reportLine("When", item.due_date || "今天 / 未指定截止日期")}
              ${reportLine("Where", "未指定")}
              ${reportLine("How", `优先级：${labelLevel(item.priority)}，重要度：${labelLevel(item.importance)}，紧急度：${labelLevel(item.urgency)}`)}
              ${reportLine("How much", "未指定")}
            </div>
          </div>
        `;
      }

      function reportLine(key, value) {
        return `<div class="report-line"><span class="report-key">${escapeHtml(key)}</span><span>${escapeHtml(value || "未指定")}</span></div>`;
      }

      function selectHtml(name, selectedValue, options) {
        return `<select name="${escapeAttribute(name)}">${options
          .map(([value, label]) => `<option value="${escapeAttribute(value)}" ${value === selectedValue ? "selected" : ""}>${escapeHtml(label)}</option>`)
          .join("")}</select>`;
      }

      function bindTaskEditForms() {
        const forms = document.querySelectorAll(".task-edit-form");
        for (let index = 0; index < forms.length; index += 1) {
          const form = forms[index];
          form.addEventListener("submit", async (event) => {
            event.preventDefault();
            const status = form.querySelector(".status");
            setStatus(status, "保存中...");
            const importance = form.elements.importance.value;
            const dueDate = form.elements.due_date.value || null;
            const urgency = urgencyWithDueDate(form.elements.urgency.value, dueDate);
            const payload = {
              title: form.elements.title.value.trim(),
              description: form.elements.description.value.trim() || null,
              importance,
              urgency,
              priority: evaluateTaskPriority(importance, urgency),
              due_date: dueDate,
            };
            try {
              await api(`/tasks/${form.getAttribute("data-task-id")}`, {
                method: "PATCH",
                body: JSON.stringify(payload),
              });
              setStatus(status, "已保存");
              await refresh();
            } catch (error) {
              setStatus(status, "保存失败", true);
            }
          });
        }
      }

      function bindCurrencyButtons() {
        const buttons = document.querySelectorAll("[data-display-currency]");
        for (let index = 0; index < buttons.length; index += 1) {
          const button = buttons[index];
          button.addEventListener("click", (event) => {
            event.preventDefault();
            event.stopPropagation();
            setDisplayCurrency(button.getAttribute("data-display-currency"));
          });
        }
        updateCurrencyButtons();
      }

      function bindTaskPriorityPreview() {
        document.querySelector("#task-importance").addEventListener("change", updateTaskPriorityPreview);
        document.querySelector("#task-urgency").addEventListener("change", updateTaskPriorityPreview);
        document.querySelector("#task-due-date").addEventListener("change", updateTaskPriorityPreview);
        updateTaskPriorityPreview();
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function escapeAttribute(value) {
        return escapeHtml(value).replace(/`/g, "&#096;");
      }

      async function refresh() {
        const [activities, tasks, thoughts, money, daily] = await Promise.all([
          api("/activity-logs"),
          api("/tasks"),
          api("/thoughts"),
          api("/money"),
          api("/daily/briefing"),
        ]);
        renderActivity(activities);
        renderTasks(tasks);
        renderThoughts(thoughts);
        renderStats(tasks, activities, money);
        renderFinanceProfile();
        renderBriefing(daily);
      }

      activityForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        setStatus(activityStatus, "保存中...");
        const payload = {
          title: document.querySelector("#activity-title").value.trim(),
          category: document.querySelector("#activity-category").value || null,
          note: document.querySelector("#activity-note").value.trim() || null,
          occurred_at: localDateTimeValue(document.querySelector("#activity-time").value),
        };
        try {
          await api("/activity-logs", { method: "POST", body: JSON.stringify(payload) });
          activityForm.reset();
          setStatus(activityStatus, "已记录");
          await refresh();
        } catch (error) {
          setStatus(activityStatus, "保存失败", true);
        }
      });

      taskForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        setStatus(taskStatus, "保存中...");
        const descriptionInput = document.querySelector("#task-description");
        const importance = document.querySelector("#task-importance").value;
        const dueDate = document.querySelector("#task-due-date").value || null;
        const urgency = urgencyWithDueDate(document.querySelector("#task-urgency").value, dueDate);
        const payload = {
          title: document.querySelector("#task-title").value.trim(),
          description: descriptionInput ? descriptionInput.value.trim() || null : null,
          type: document.querySelector("#task-type").value,
          priority: evaluateTaskPriority(importance, urgency),
          importance,
          urgency,
          due_date: dueDate,
        };
        try {
          await api("/tasks", { method: "POST", body: JSON.stringify(payload) });
          taskForm.reset();
          setStatus(taskStatus, "已添加");
          await refresh();
        } catch (error) {
          setStatus(taskStatus, "保存失败", true);
        }
      });

      thoughtForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        setStatus(thoughtStatus, "保存中...");
        const payload = {
          content: document.querySelector("#thought-content").value.trim(),
          tag: document.querySelector("#thought-tag").value.trim() || null,
        };
        try {
          await api("/thoughts", { method: "POST", body: JSON.stringify(payload) });
          thoughtForm.reset();
          setStatus(thoughtStatus, "已保存");
          await refresh();
        } catch (error) {
          setStatus(thoughtStatus, "保存失败", true);
        }
      });

      financeForm.addEventListener("submit", (event) => {
        event.preventDefault();
        setStatus(financeStatus, "保存中...");
        try {
          financeProfile.assetsByCurrency = {
            JPY: Number(document.querySelector("#asset-jpy").value || 0),
            CNY: Number(document.querySelector("#asset-cny").value || 0),
            USD: Number(document.querySelector("#asset-usd").value || 0),
            BTC: Number(document.querySelector("#asset-btc").value || 0),
            ETH: Number(document.querySelector("#asset-eth").value || 0),
          };
          financeProfile.dailyIncome = Number(document.querySelector("#finance-daily-income-input").value || 0);
          financeProfile.dailyIncomeCurrency = document.querySelector("#finance-daily-income-currency").value;
          financeProfile.target = Number(document.querySelector("#finance-target-input").value || 0);
          financeProfile.targetCurrency = document.querySelector("#finance-target-currency").value;
          saveFinanceProfile(financeProfile);
          renderFinanceProfile();
          document.querySelector("#stat-net").textContent = formatMoneyWithCurrency(
            getFinanceGap(financeProfile.displayCurrency),
            financeProfile.displayCurrency,
          );
          setStatus(financeStatus, "已更新");
        } catch (error) {
          setStatus(financeStatus, "更新失败", true);
        }
      });

      bindCurrencyButtons();
      bindTaskPriorityPreview();
      refreshExchangeRates();
      refresh().catch(() => {
        activityList.innerHTML = '<div class="empty">加载失败</div>';
        taskList.innerHTML = '<div class="empty">加载失败</div>';
        notTodoList.innerHTML = '<div class="empty">加载失败</div>';
        thoughtList.innerHTML = '<div class="empty">加载失败</div>';
        briefing.innerHTML = '<div class="empty">加载失败</div>';
      });
    </script>
  </body>
</html>
